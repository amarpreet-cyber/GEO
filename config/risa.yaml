# =============================================================================
# RISA GEO — Answer Engine Visibility config
# Everything brand/domain-specific lives here. Swap this file to track a
# different brand; the pipeline code never hardcodes RISA.
# =============================================================================

brand:
  name: "RISA Labs"
  # Aliases an AI engine might use when referring to RISA. Matched with word
  # boundaries, case-insensitive. Keep "Risa" alone OUT unless scoped — too noisy.
  aliases:
    - "RISA Labs"
    - "RISA"
    - "Risa Labs"
    - "RISA Health"
    - "RISA oncology"
    - "risalabs"
  domain: "risalabs.ai"
  # Domains we own / control. Citations to these count as OWNED media.
  owned_domains:
    - "risalabs.ai"
    - "risalabs.com"
  positioning: >
    RISA Labs is an AI operating system for oncology — a provider-side control
    plane that runs auth-to-cash across both medical prior authorization and
    pharma / drug economics in a single platform. Oncology-focused, provider-side,
    spans the medical and drug sides end to end.
  proof_metrics:
    touchless_prior_auth: "30%"
    first_submission_approval: "95%+"
    date_of_service_auth: "99.5%"
    sop_compliant_order_processing: "99.8%"
    fte_reduction: "75%"
    implementation_time: "< 2 weeks"
  trust_anchors:
    - "OneOncology (largest US community oncology network)"
    - "$11M Series A (Cencora Ventures + Optum Ventures)"
    - "Mayo Accelerate Programme"
    - "20+ peer-reviewed citations"
    - "Flatiron preferred partner"
    - "HIPAA + SOC2 compliant"
    - "Live with 8 practices, expanding to 20 by June 2026"

