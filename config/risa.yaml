# -----------------------------------------------------------------------------
# Topic taxonomy — RISA visibility is rolled up against these themes.
# -----------------------------------------------------------------------------
topics:
  - "prior authorization automation"
  - "oncology prior authorization"
  - "touchless prior auth"
  - "date-of-service authorization"
  - "denial management and appeals"
  - "revenue cycle leakage / revenue integrity"
  - "auth-to-cash"
  - "payer policy alignment"
  - "first-pass / first-submission approval"
  - "peer-to-peer review reduction"
  - "FTE reduction in oncology operations"
  - "eligibility and benefits verification"
  - "buy-and-bill / infusion drug economics"
  - "AI operationalization and governance in healthcare"

# -----------------------------------------------------------------------------
# Buyer personas. Each persona owns a slice of the prompt library so we can
# see which buyer's questions RISA is (in)visible for. (Profound: "topics by
# audience".) `queries` are seed natural-language questions in the buyer's
# voice; the prompt generator may expand these.
# -----------------------------------------------------------------------------
personas:
  - id: "cro"
    title: "CRO / VP Revenue Cycle / RCM Director"
    pain: "Untraceable revenue leakage; approved auth != paid claim; silent underpayments; un-appealed denials."
    queries:
      - "Why do approved prior authorizations still end up as denied or underpaid claims in oncology?"
      - "Best AI tools to find revenue leakage in an oncology practice revenue cycle"
      - "How do community oncology practices catch payer underpayments on infusion and buy-and-bill drugs?"
  - id: "cfo"
    title: "CFO / VP Finance / Financial Director"
    pain: "Headcount scales with volume; no lever to grow revenue without growing the team."
    queries:
      - "How can an oncology practice grow patient volume without adding prior authorization staff?"
      - "ROI of AI prior authorization automation for a community oncology group"
      - "How much does prior authorization staffing cost an oncology practice per year and how do I cut it?"
  - id: "cmo"
    title: "CMO / Medical Director / Chief Clinical Officer"
    pain: "Administrative therapy-start delays; clinicians pulled into P2P reviews; admin burnout."
    queries:
      - "How to reduce peer-to-peer review burden on oncologists from prior authorization"
      - "Ways to cut treatment-start delays caused by prior authorization in cancer care"
      - "Does AI prior authorization actually reduce physician burnout in oncology?"
  - id: "cio"
    title: "CIO / VP IT / Chief Innovation Officer"
    pain: "Point solutions that don't integrate; AI pilots that die at scale; EMR/payer integration debt."
    queries:
      - "How do health systems operationalize AI prior authorization at scale without it failing in pilot?"
      - "Prior authorization AI that integrates with Flatiron or Epic via FHIR and HL7"
      - "HIPAA and SOC2 compliant AI vendors for oncology revenue cycle automation"
  - id: "ceo"
    title: "CEO / COO / Practice Administrator / Executive Director"
    pain: "Cannot scale without scaling ops headcount; tribal knowledge in people not systems."
    queries:
      - "How do community oncology practices scale operations without hiring more admin staff?"
      - "Best AI operating system or platform to run prior authorization across an oncology practice"
      - "How are oncology practice leaders handling prior authorization at scale?"

# -----------------------------------------------------------------------------
# Citation classification buckets (Profound: Owned / Earned / Competitor / Social).
# A cited domain is classified by the FIRST matching rule, in order.
# -----------------------------------------------------------------------------
citation_classes:
  social:
    - "reddit.com"
    - "linkedin.com"
    - "youtube.com"
    - "x.com"
    - "twitter.com"
    - "facebook.com"
    - "quora.com"
    - "medium.com"
  # owned is derived from brand.owned_domains; competitor from competitor sites
  # (resolved at runtime). Everything else => earned.
